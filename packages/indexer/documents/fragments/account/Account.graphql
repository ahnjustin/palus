fragment Account on Account {
  owner
  address
  rules {
    anyOf {
      ...AccountFollowRule
    }
    required {
      ...AccountFollowRule
    }
  }
  operations {
    ...LoggedInAccountOperations
  }
  metadata {
    ...AccountMetadata
  }
  username {
    ...Username
  }
  score
  createdAt
  isAdmin: isMemberOf(
    request: { group: "0x3B12d0255Fe501307D3616F2CFc95398FF11e5E9" }
  )
}
