fragment Account on Account {
  owner
  address
  rules {
    anyOf {
      ...AccountFollowRule
    }
    required {
      ...AccountFollowRule
    }
  }
  operations {
    ...LoggedInAccountOperations
  }
  metadata {
    ...AccountMetadata
  }
  username {
    ...Username
  }
  score
  createdAt
  isAdmin: isMemberOf(
    request: { group: "0x7e4A751818969f8ba35b56B0D726FB8A5A7FA84b" }
  )
}
