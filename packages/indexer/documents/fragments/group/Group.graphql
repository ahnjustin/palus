fragment Group on Group {
  address
  owner
  membershipApprovalEnabled
  feed {
    address
    rules {
      required {
        ...FeedRule
      }
    }
  }
  rules {
    anyOf {
      ...GroupRule
    }
    required {
      ...GroupRule
    }
  }
  operations {
    ...LoggedInGroupOperations
  }
  metadata {
    ...GroupMetadata
  }
  timestamp
}
